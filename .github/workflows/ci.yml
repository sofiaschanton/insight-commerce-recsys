name: Integración Continua

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    name: Tests + Quality (Python 3.10)
    runs-on: ubuntu-latest

    env:
      S3_BUCKET: insight-commerce-artifacts
      USE_S3: "false"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov mypy

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v

      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports --no-strict-optional

      - name: SonarQube Scan
        # sonarcloud-github-action fue deprecado y archivado en oct 2025
        # migrado a sonarqube-scan-action (acción unificada para SonarQube Server y Cloud)
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
